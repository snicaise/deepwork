version: 2
project_name: deepwork

before:
  hooks:
    - go mod tidy

builds:
  - id: deepwork
    main: ./cmd/deepwork
    binary: deepwork
    env:
      - CGO_ENABLED=0
    goos: [darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: deepwork-apply
    main: ./cmd/deepwork-apply
    binary: deepwork-apply
    env:
      - CGO_ENABLED=0
    goos: [darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    ids:
      - deepwork
      - deepwork-apply
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - install.sh

checksum:
  name_template: "checksums.txt"

release:
  draft: false
  prerelease: auto
